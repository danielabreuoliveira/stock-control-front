<div class="container">

  <div class="header">
    <h2>Categorias</h2>

    <button class="btn-nova" (click)="abrirModal()">
      + Nova Categoria
    </button>
  </div>


  <table class="tabela">

    <thead>
      <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Descrição</th>
        <th>Ações</th>
      </tr>
    </thead>


    <tbody>

      @for (categoria of categorias; track categoria.id) {

        <tr>

          <td>{{ categoria.id }}</td>

          <td>{{ categoria.nome }}</td>

          <td>{{ categoria.descricao }}</td>

          <td>
            <button 
              class="btn-editar"
              (click)="editar(categoria)">
              Editar
            </button>
          </td>

        </tr>

      }

    </tbody>

  </table>

</div>
