<h2>Categorias</h2>

<button type="button" (click)="abrirModal()">
  Nova Categoria
</button>

<table>
  <thead>
    <tr> 
      <th>ID</th>
      <th>Nome</th>
      <th>Descrição</th>
      <th>Ações</th>
    </tr>
  </thead>

  <tbody>
    @for (categoria of categorias; track categoria.id) {
      <tr>
        <td>{{ categoria.id }}</td>
        <td>{{ categoria.nome }}</td>
        <td>{{ categoria.descricao }}</td>
        <td>
          <button (click)="editar(categoria)">
            Editar
          </button>
        </td>
      </tr>
    }
  </tbody>
</table>
