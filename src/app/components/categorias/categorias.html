<h2>Categorias</h2>
<button type="button" (click)="abrirModal()">Nova Categoria</button>
<table>
  <thead>
    <tr> 
      <th>ID</th>
      <th>Nome</th>
      <th>Descrição</th>
      <th>Ações</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let categoria of categorias">
      <td>{{ categoria.id }}</td>
      <td>{{ categoria.nome }}</td>
      <td>{{ categoria.descricao }}</td>
      <td><button (click)="editar(categoria)">Editar</button></td>
    </tr>
  </tbody>
</table>
